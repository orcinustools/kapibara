# Deploy the Kapibara control-plane onto the orcinus cluster, exposed at a
# domain with automatic TLS.
#
#   orcinus deploy -f deploy/kapibara.compose.yml --project kapibara --wait
#
# Before deploying:
#   1. Build & push the image (see deploy/README.md) and set `image:` below.
#   2. Replace kapibara.example.com with your host (wildcard/A record → cluster);
#      also point *.apps.example.com at the cluster for deployed apps.
#   3. Fill KAPIBARA_ORCINUS_URL / _TOKEN, and set strong JWT + ACME email.
#   4. Apply deploy/rbac.yaml so the pod may read pod logs + metrics.
#   5. For the built-in Docker registry gateway: install the orcinus `registry`
#      plugin (`orcinus plugin install registry`) and set the registry env below.
services:
  kapibara:
    image: ghcr.io/orcinustools/kapibara:latest
    ports:
      - "9000"
    # Expose via the cluster ingress at a domain, with a Let's Encrypt cert.
    x-orcinus-expose: ingress
    x-orcinus-host: kapibara.example.com
    x-orcinus-tls: letsencrypt
    x-orcinus-path: /
    x-orcinus-port: 9000
    environment:
      KAPIBARA_ADDR: ":9000"
      # orcinus engine API, reachable from inside the cluster. Adjust to your
      # setup (in-cluster Service, or the node/host IP where orcinus listens).
      KAPIBARA_ORCINUS_URL: "http://orcinus-api:8899"
      KAPIBARA_ORCINUS_TOKEN: "replace-with-orcinus-token"
      # TLS issuance for app domains you deploy later.
      KAPIBARA_ACME_EMAIL: "you@example.com"
      # Signs sessions/API tokens — generate with `openssl rand -hex 32`.
      KAPIBARA_JWT_SECRET: "replace-with-a-long-random-secret"
      # Public base URL (OAuth redirects, registry token realm). Your host.
      KAPIBARA_PUBLIC_URL: "https://kapibara.example.com"
      # Base wildcard domain for deployed apps → <app>.apps.example.com. Exposed
      # via `kapibara info` / GET /config so the UI/CLI/agents derive app hosts.
      KAPIBARA_APPS_DOMAIN: "apps.example.com"
      # --- Built-in Docker registry gateway (needs the orcinus `registry` plugin) ---
      # Upstream in-cluster registry the /v2 gateway proxies to (registry:5000).
      KAPIBARA_REGISTRY_UPSTREAM: "http://registry.orcinus-registry.svc:5000"
      # Public host of the gateway (usually this same server's host). App images
      # written as registry/<project>/<image> are rewritten to pull from here.
      KAPIBARA_REGISTRY_PUBLIC: "kapibara.example.com"
      # --- Server-side, Docker-less Git builds (optional) ---
      # Build from Git in-cluster: clone → railpack/Dockerfile → buildctl builds
      # against BuildKit and pushes to the in-cluster registry; the cluster pulls
      # it back through the gateway above. Deploy the daemon first:
      #   orcinus kubectl apply -f deploy/buildkitd.yaml
      # Then enable it here (uncomment):
      # KAPIBARA_INCLUSTER_BUILD: "1"
      # KAPIBARA_BUILDKIT_ADDR: "tcp://buildkitd.orcinus-build.svc:1234"
      # Pin the railpack frontend to the railpack version bundled in the image.
      # KAPIBARA_RAILPACK_FRONTEND: "ghcr.io/railwayapp/railpack-frontend:v0.30.0"
      # KAPIBARA_BUILD_PLATFORM: "linux/amd64"
      # Persist the SQLite store + build cache on the mounted volume.
      KAPIBARA_DATA_DIR: "/data"
      KAPIBARA_DATABASE_URL: "/data/kapibara.db"
      KAPIBARA_NAMESPACE: "default"
      # No kubeconfig is set: Kapibara uses the pod's in-cluster service account
      # (the namespace "default" SA) for logs/metrics. deploy/rbac.yaml grants
      # that SA the required read access.
    # Mark the sensitive env keys so orcinus stores them as a Kubernetes Secret.
    x-orcinus-secret:
      - KAPIBARA_ORCINUS_TOKEN
      - KAPIBARA_JWT_SECRET
    volumes:
      - kapibara-data:/data
    x-orcinus-volume-size: 2Gi

volumes:
  kapibara-data:
