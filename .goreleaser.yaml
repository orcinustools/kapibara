# GoReleaser config — builds kapibara binaries + archives on each release tag.
# The embedded web UI (pkg/webui/dist) is regenerated by the release workflow
# before this runs; the `before` hook only tidies modules.
# Validate locally with: goreleaser check   (and: goreleaser release --snapshot --clean)
version: 2

project_name: kapibara

before:
  hooks:
    - go mod tidy

builds:
  - id: kapibara
    main: ./cmd/kapibara
    binary: kapibara
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/orcinustools/kapibara/pkg/version.Version={{ .Version }}
      - -X github.com/orcinustools/kapibara/pkg/version.GitCommit={{ .ShortCommit }}

archives:
  - id: kapibara
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - docs/**/*

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: orcinustools
    name: kapibara
  draft: false
  prerelease: auto
